<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads 廣告 — 愛默思科技</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
    }

    /* ── 廣告畫布 1080×1080 縮放至視窗 ── */
    .canvas {
      width:  min(90vw, 90vh);
      height: min(90vw, 90vh);
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: linear-gradient(145deg, #0d2a4a 0%, #0a1a2e 50%, #060d18 100%);
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }

    /* 背景格紋 */
    .canvas::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridFade 1s ease forwards;
      opacity: 0;
    }

    /* 右上角光暈 */
    .glow {
      position: absolute;
      width: 60%; height: 60%;
      top: -20%; right: -20%;
      background: radial-gradient(circle, rgba(232,144,42,0.12) 0%, transparent 70%);
      animation: glowPulse 4s ease-in-out 1s infinite;
      opacity: 0;
    }
    /* 左下角光暈 */
    .glow2 {
      position: absolute;
      width: 50%; height: 50%;
      bottom: -15%; left: -15%;
      background: radial-gradient(circle, rgba(42,82,152,0.25) 0%, transparent 70%);
      animation: glowPulse 5s ease-in-out 2s infinite;
      opacity: 0;
    }

    /* ── 內容區 ── */
    .content {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8%;
      text-align: center;
      gap: 0;
    }

    /* Logo 區 */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 4%;
      margin-bottom: 6%;
      opacity: 0;
      animation: fadeInDown 0.9s cubic-bezier(.22,1,.36,1) 0.8s forwards;
    }
    .logo-icon {
      width: 15%;
      aspect-ratio: 1;
      background: #e8902a;
      border-radius: 18%;
      display: flex; align-items: center; justify-content: center;
      animation: iconSpin 0.9s cubic-bezier(.22,1,.36,1) 0.8s both;
      flex-shrink: 0;
    }
    .logo-icon svg {
      width: 55%; height: 55%;
      fill: #fff;
    }
    .logo-text { text-align: left; }
    .logo-name {
      display: block;
      font-size: clamp(14px, 5.5%, 52px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      line-height: 1.15;
      white-space: nowrap;
    }
    .logo-sub {
      display: block;
      font-size: clamp(8px, 2.5%, 24px);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* 橘色分隔線 */
    .divider {
      width: 0;
      height: clamp(2px, 0.5%, 5px);
      background: linear-gradient(90deg, #e8902a, #f5b860);
      border-radius: 4px;
      margin-bottom: 6%;
      animation: expandLine 0.8s ease 2s forwards;
    }

    /* 主標題 */
    .headline {
      font-size: clamp(14px, 5.8%, 56px);
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      letter-spacing: 0.04em;
      margin-bottom: 3%;
      opacity: 0;
      animation: fadeInUp 0.9s cubic-bezier(.22,1,.36,1) 2.8s forwards;
    }
    .headline em { color: #e8902a; font-style: normal; }

    /* 副標 */
    .subline {
      font-size: clamp(9px, 3%, 29px);
      color: rgba(255,255,255,0.68);
      line-height: 1.6;
      letter-spacing: 0.02em;
      margin-bottom: 7%;
      opacity: 0;
      animation: fadeInUp 0.9s cubic-bezier(.22,1,.36,1) 3.8s forwards;
    }

    /* 服務項目 */
    .services {
      display: flex;
      gap: 3%;
      margin-bottom: 7%;
      width: 100%;
      justify-content: center;
    }
    .service-tag {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 2.5% 3.5%;
      flex: 1;
      opacity: 0;
    }
    .service-tag:nth-child(1) { animation: fadeInUp 0.7s ease 5.2s forwards; }
    .service-tag:nth-child(2) { animation: fadeInUp 0.7s ease 5.9s forwards; }
    .service-tag:nth-child(3) { animation: fadeInUp 0.7s ease 6.6s forwards; }

    .service-icon { font-size: clamp(12px, 4.5%, 44px); margin-bottom: 4%; display: block; }
    .service-name {
      font-size: clamp(7px, 2.8%, 27px);
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
      display: block;
    }

    /* 數字統計 */
    .stats {
      display: flex;
      gap: 0;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 7%;
      opacity: 0;
      animation: fadeIn 1s ease 8s forwards;
    }
    .stat {
      flex: 1;
      padding: 4% 2%;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      display: block;
      font-size: clamp(16px, 7%, 68px);
      font-weight: 900;
      color: #e8902a;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stat-lbl {
      display: block;
      font-size: clamp(7px, 2.5%, 24px);
      color: rgba(255,255,255,0.55);
      margin-top: 4%;
    }

    /* 網址 CTA */
    .cta-wrap {
      opacity: 0;
      animation: fadeInUp 1s ease 10s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3%;
      width: 100%;
    }
    .cta-label {
      font-size: clamp(7px, 2.5%, 24px);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .cta-url {
      background: linear-gradient(135deg, #e8902a, #f5b860);
      color: #fff;
      font-size: clamp(8px, 3%, 29px);
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 2.5% 8%;
      border-radius: 50px;
      animation: ctaPulse 2s ease-in-out 11.5s infinite;
    }

    /* ── Keyframes ── */
    @keyframes gridFade {
      to { opacity: 1; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes iconSpin {
      from { opacity: 0; transform: rotate(-180deg) scale(0.3); }
      to   { opacity: 1; transform: rotate(0deg)   scale(1); }
    }
    @keyframes expandLine {
      from { width: 0; }
      to   { width: 20%; }
    }
    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(232,144,42,0.5); transform: scale(1); }
      50%       { box-shadow: 0 0 0 12px rgba(232,144,42,0);   transform: scale(1.04); }
    }
  </style>
</head>
<body>

<div class="canvas">
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="content">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>

        </svg>
      </div>
      <div class="logo-text">
        <!-- TODO: 替換公司名稱 -->
        <span class="logo-name">愛默思科技</span>
        <span class="logo-sub">Amos Technology</span>
      </div>
    </div>

    <!-- 橘色線 -->
    <div class="divider"></div>

    <!-- 主標題 -->
    <h1 class="headline">
      <!-- TODO: 替換標語 -->
      為您打造<em>高效、穩定</em>的<br>自動化生產設備
    </h1>

    <p class="subline">

    </p>

    <!-- 三大服務 -->
    <div class="services">

      </div>
    </div>

    <!-- 統計數字 -->

      <!-- TODO: 依實際數字替換 -->
      <div class="stat">
        <span class="stat-num">15+</span>
        <span class="stat-lbl">年產業經驗</span>
      </div>
      <div class="stat">
        <span class="stat-num">100+</span>
        <span class="stat-lbl">完成專案</span>
      </div>
      <div class="stat">
        <span class="stat-num">50+</span>
        <span class="stat-lbl">合作客戶</span>

    </div>

    <!-- 網址 -->
    <div class="cta-wrap">
      <span class="cta-label">立即了解更多</span>
      <!-- TODO: 替換為實際網址 -->
      <span class="cta-url">amos-design.com</span>
    </div>

  </div>
</div>

</body>
</html>
